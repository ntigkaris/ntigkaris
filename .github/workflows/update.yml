name: Update Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: generate
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&hide_title=true&show_icons=true&include_all_commits=true&rank_icon=github&theme=cobalt2
          path: tmp/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add tmp/*.svg
          git commit -m "created stats image" || exit 0
          git push
